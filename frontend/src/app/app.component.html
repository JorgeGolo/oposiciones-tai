<mat-sidenav-container class="layout">
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="sidebar"
  >
    <div class="sidebar__brand">Oposición TAI</div>
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/estructura"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        >Estructura</a
      >
      <a
        mat-list-item
        routerLink="/conexion-backend"
        routerLinkActive="active-link"
        >Conexión Backend</a
      >
      <a mat-list-item routerLink="/frontend" routerLinkActive="active-link"
        >Frontend</a
      >
      <a mat-list-item routerLink="/basededatos" routerLinkActive="active-link"
        >Base de Datos</a
      >
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      @if (isMobile()) {
        <button
          mat-icon-button
          (click)="sidenav.toggle()"
          aria-label="Abrir menú"
        >
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="topbar__title">Panel de estudio</span>
    </mat-toolbar>
    <main class="content mx-3">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
